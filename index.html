<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Visual Studio | Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="auth.js"></script>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo justify-center mb-4">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>AI Visual Studio</span>
                </div>
                <h2>Selamat Datang</h2>
                <p>Silakan masuk menggunakan email yang terdaftar</p>
            </div>

            <form id="login-form">
                <div class="form-group mb-4">
                    <label for="email-input">Alamat Email</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="email-input" placeholder="contoh: user@test.com" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary w-100">
                    Masuk ke Dashboard <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
            
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden">
        <i class="fa-solid fa-check-circle"></i>
        <span id="toast-message"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
