<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Magic AI - V11.0 Master Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Core Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #f8fafc;
        }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        .premium-shadow { box-shadow: 0 20px 50px -12px rgba(79, 70, 229, 0.1); }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .sidebar-active { background: white; color: #4f46e5; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Komponen Ikon Stabil
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons();
                }
            }, [name]);
            const lucideName = name === 'Image' ? 'image' : name.toLowerCase();
            return <i data-lucide={lucideName} ref={iconRef} className={className} style={{ display: 'inline-flex', width: size, height: size }}></i>;
        };

        // --- KONFIGURASI API ---
        const apiKey = "AIzaSyBmipegbkCs1uZW2taRf6WF4NxS8B1STL8"; // MASUKKAN API KEY GOOGLE AI STUDIO BAPAK DI SINI
        const MODEL_NAME = "gemini-1.5-flash"; 

        const App = () => {
            const [user, setUser] = useState(null);
            const [emailInput, setEmailInput] = useState("");
            const [activeTab, setActiveTab] = useState("home");
            const [isProcessing, setIsProcessing] = useState(false);
            const [processStatus, setProcessStatus] = useState("");
            const [error, setError] = useState(null);
            const [generatedResults, setGeneratedResults] = useState([]);
            const [copiedIndex, setCopiedIndex] = useState(null);

            // State Media
            const [productImages, setProductImages] = useState([]); 
            const [backgroundImages, setBackgroundImages] = useState([]); 
            
            // State Parameter
            const [lighting, setLighting] = useState("Light");
            const [mood, setMood] = useState("Clean");
            const [modelType, setModelType] = useState("Tanpa Model");
            const [ratio, setRatio] = useState("9:16");
            const [extraInstructions, setExtraInstructions] = useState("");
            const [includeDoodles, setIncludeDoodles] = useState(true);
            const [quantity, setQuantity] = useState(3);

            const allowedEmails = ["ratmi.ardian@gmail.com", "pembeli@magic.com", "admin@magic.com"];

            const handleLogin = (e) => {
                e.preventDefault();
                if (allowedEmails.includes(emailInput.toLowerCase())) {
                    setUser({ email: emailInput });
                    setActiveTab("home");
                    setError(null);
                } else { setError("Email lisensi tidak valid."); }
            };

            const handleImageUpload = (e, type) => {
                const files = Array.from(e.target.files);
                const limit = type === 'product' ? 5 : 2;
                if (files.length > limit) { setError(`Maksimal ${limit} foto saja.`); return; }
                
                const readers = files.map(file => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                });

                Promise.all(readers).then(results => {
                    if (type === 'product') setProductImages(results);
                    else setBackgroundImages(results);
                    setGeneratedResults([]);
                    setError(null);
                });
            };

            const extractJson = (text) => {
                try {
                    const jsonMatch = text.match(/\{[\s\S]*\}/);
                    return jsonMatch ? JSON.stringify(JSON.parse(jsonMatch[0]), null, 2) : text;
                } catch (e) { return text; }
            };

            const generateAI = async (modeType) => {
                if (productImages.length === 0) { setError("Pilih foto produk dulu, Pak!"); return; }
                if (!apiKey) { setError("API KEY KOSONG: Masukkan Key di baris 43 index.html."); return; }

                setIsProcessing(true);
                setError(null);
                setGeneratedResults([]);
                setProcessStatus("Menganalisis skenario jualan...");

                try {
                    const finalResults = [];
                    const targetCount = Math.min(quantity, 5);

                    for (let i = 0; i < targetCount; i++) {
                        setProcessStatus(`Merender Master Prompt ${i + 1} dari ${targetCount}...`);
                        
                        let taskContext = "";
                        if (modeType === 'merger') taskContext = "TUGAS: GABUNGKAN GAMBAR. Integrasikan foto produk dan latar belakang menjadi satu konsep video motion promosi yang mewah.";
                        else if (modeType === 'motion') taskContext = "TUGAS: PROMPT VIDEO MOTION. Fokus pada instruksi kamera sinematik, efek cahaya, dan detail material produk.";
                        else taskContext = `TUGAS: FOTO + MODEL. Masukkan model '${modelType}'. Jika 'Manusia', WAJIBKAN TANGAN MANUSIA MEMEGANG PRODUK SECARA PROFESIONAL (POV 1).`;

                        const prompt = `STRICT RULE: PRODUK HARUS 100% IDENTIK.
                        ${taskContext}
                        PARAMETER: Rasio ${ratio}, Cahaya ${lighting}, Suasana ${mood}.
                        DOODLE: ${includeDoodles ? 'Tambahkan coretan doodle putih artistik (labels: BEST SELLER, NEW).' : 'Clean.'}
                        NOTE: ${extraInstructions}
                        
                        OUTPUT: BERIKAN HANYA BLOK JSON. TANPA TEKS LAIN.
                        FORMAT JSON: { "aspect_ratio": "${ratio}", "camera": "Orbit/Dolly", "video_prompt": "Cinematic motion design for product, high quality 4k, realistic texture, hand interaction if applicable." }`;

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }, ...productImages.map(img => ({ inlineData: { mimeType: "image/png", data: img.split(",")[1] } }))] }]
                            })
                        });

                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(`Google API: ${errorData.error.message || 'Gagal terhubung'}`);
                        }

                        const data = await response.json();
                        const textOut = data.candidates?.[0]?.content?.parts?.[0]?.text;

                        if (textOut) {
                            finalResults.push({
                                url: productImages[0], 
                                jsonPrompt: extractJson(textOut)
                            });
                            setGeneratedResults([...finalResults]);
                        }
                        await new Promise(r => setTimeout(r, 600));
                    }
                    setActiveTab("result");
                } catch (err) { 
                    setError(err.message || "Gagal memproses."); 
                } finally { 
                    setIsProcessing(false); 
                    setProcessStatus(""); 
                }
            };

            const copyToClipboard = (text, index) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopiedIndex(index);
                setTimeout(() => setCopiedIndex(null), 2000);
            };

            if (!user) {
                return (
                    <div className="min-h-screen bg-indigo-50 flex items-center justify-center p-6">
                        <div className="max-w-md w-full bg-white rounded-[3rem] premium-shadow p-10 border border-white animate-in">
                            <div className="text-center mb-10">
                                <div className="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-200">
                                    <Icon name="Zap" size={40} className="text-white" />
                                </div>
                                <h1 className="text-3xl font-black text-slate-900 tracking-tighter italic leading-none">Studio Magic AI</h1>
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-3">V11.0 • Master Generator</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" className="w-full bg-slate-50 border border-slate-200 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm shadow-inner" placeholder="Email Lisensi..." value={emailInput} onChange={(e) => setEmailInput(e.target.value)} required />
                                {error && <p className="text-red-500 text-[10px] font-bold px-2 text-center">{error}</p>}
                                <button className="w-full bg-indigo-600 py-5 rounded-2xl text-white font-black uppercase tracking-widest text-xs shadow-lg active:scale-95 transition-all">Buka Studio</button>
                            </form>
                            <p className="mt-8 text-center text-[10px] text-slate-300 font-bold uppercase tracking-widest italic leading-relaxed">ratmi.ardian@gmail.com</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white text-slate-900 flex flex-col font-sans selection:bg-indigo-50">
                    <div className="flex flex-col lg:flex-row min-h-screen overflow-hidden">
                        {/* Sidebar Desktop */}
                        <aside className="hidden lg:flex w-72 bg-slate-50 border-r border-slate-100 p-8 flex flex-col premium-shadow z-20">
                            <div className="flex items-center gap-3 mb-12">
                                <div className="bg-indigo-600 p-2.5 rounded-xl shadow-lg">
                                    <Icon name="Zap" size={20} className="text-white" />
                                </div>
                                <span className="font-black text-xl tracking-tighter uppercase text-slate-900 italic">Magic AI</span>
                            </div>
                            <div className="space-y-3 flex-1">
                                <NavBtn active={activeTab === 'home'} icon="Home" label="Beranda" onClick={() => setActiveTab('home')} />
                                <NavBtn active={activeTab === 'merger'} icon="Layers3" label="Gabung Foto" onClick={() => { setActiveTab('merger'); setGeneratedResults([]); }} />
                                <NavBtn active={activeTab === 'motion'} icon="Film" label="Video Motion" onClick={() => { setActiveTab('motion'); setGeneratedResults([]); }} />
                                <NavBtn active={activeTab === 'model'} icon="PersonStanding" label="Foto + Model" onClick={() => { setActiveTab('model'); setGeneratedResults([]); }} />
                            </div>
                            <div className="mt-auto border-t border-slate-200 pt-8">
                                <button onClick={() => setUser(null)} className="flex items-center gap-4 p-4 text-slate-400 hover:text-red-500 font-black text-[10px] uppercase tracking-widest transition-colors w-full">
                                    <Icon name="LogOut" size={16} /><span>Logout Akun</span>
                                </button>
                            </div>
                        </aside>

                        {/* Mobile Header / Nav */}
                        <div className="lg:hidden flex items-center justify-between p-6 border-b border-slate-100 bg-white sticky top-0 z-50">
                            <div className="flex items-center gap-2">
                                <Icon name="Zap" size={20} className="text-indigo-600" />
                                <span className="font-black text-sm tracking-tighter uppercase italic leading-none">Magic Studio</span>
                            </div>
                            <button onClick={() => setUser(null)} className="text-slate-400"><Icon name="LogOut" size={18} /></button>
                        </div>

                        <main className="flex-1 p-6 lg:p-12 overflow-y-auto bg-white animate-in relative z-10">
                            <header className="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
                                <div>
                                    <h2 className="text-3xl lg:text-4xl font-black text-slate-900 tracking-tighter italic leading-none mb-2">
                                        {activeTab === 'home' ? 'Selamat Datang' : 'Generator Master 4K'}
                                    </h2>
                                    <p className="text-slate-400 text-[10px] lg:text-xs font-bold uppercase tracking-widest italic opacity-70">Sutradara: {user.email}</p>
                                </div>
                                {activeTab !== 'home' && (
                                    <button onClick={() => setActiveTab('home')} className="flex items-center gap-2 text-indigo-600 font-black text-[10px] uppercase tracking-widest hover:underline">
                                        <Icon name="ChevronLeft" size={14} /> Kembali Dashboard
                                    </button>
                                )}
                            </header>

                            {activeTab === 'home' && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-7xl">
                                    <FeatureCard icon="Layers3" title="Gabungkan Foto" desc="Sinergi visual 2+ foto (Produk + Background) menjadi prompt video motion unik." onClick={() => setActiveTab('merger')} />
                                    <FeatureCard icon="Film" title="Prompt Video Motion" desc="Ubah foto produk tunggal menjadi instruksi video AI 4K yang detail." onClick={() => setActiveTab('motion')} />
                                    <FeatureCard icon="PersonStanding" title="Foto + Model" desc="Integrasikan produk dengan model manusia (POV Tangan) atau manekin." onClick={() => setActiveTab('model')} />
                                </div>
                            )}

                            {(activeTab === 'merger' || activeTab === 'motion' || activeTab === 'model') && (
                                <div className="grid grid-cols-1 xl:grid-cols-5 gap-8 lg:gap-12 animate-in slide-in-from-bottom-4 pb-20">
                                    {/* Kolom Input (Kiri) */}
                                    <div className="xl:col-span-3 space-y-6">
                                        <ImageUploader type="product" images={productImages} handleUpload={handleImageUpload} handleClear={() => setProductImages([])} />
                                        {activeTab === 'merger' && (
                                            <ImageUploader type="background" images={backgroundImages} handleUpload={handleImageUpload} handleClear={() => setBackgroundImages([])} />
                                        )}
                                        <div className="mt-6 p-6 bg-indigo-50/50 rounded-[2.5rem] border border-indigo-100 flex items-start gap-4">
                                            <Icon name="Info" size={24} className="text-indigo-600 mt-1" />
                                            <div>
                                                <p className="text-[12px] text-indigo-900 font-black uppercase tracking-tight mb-1">Status Generator Master</p>
                                                <p className="text-[11px] text-indigo-700 font-medium leading-relaxed italic">Aplikasi ini menghasilkan kode JSON yang dioptimalkan untuk Video AI (Sora, Veo, Flow) berdasarkan analisis aset visual Bapak.</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Kolom Parameter (Kanan) */}
                                    <div className="xl:col-span-2 space-y-6">
                                        <div className="bg-white p-8 lg:p-10 rounded-[3rem] border border-slate-100 shadow-2xl space-y-8">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-2">
                                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest italic flex items-center gap-1"><Icon name="Sun" size={12}/> Pilih Cahaya</label>
                                                    <select value={lighting} onChange={(e) => setLighting(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 font-bold text-[11px] outline-none hover:border-indigo-300 transition-colors">
                                                        <option>Light</option><option>Dark</option><option>Vibrant</option>
                                                    </select>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest italic flex items-center gap-1"><Icon name="Palette" size={12}/> Pilih Suasana</label>
                                                    <select value={mood} onChange={(e) => setMood(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 font-bold text-[11px] outline-none hover:border-indigo-300 transition-colors">
                                                        <option>Clean</option><option>Crowd</option><option>Luxury</option>
                                                    </select>
                                                </div>
                                            </div>

                                            {activeTab === 'model' && (
                                                <div className="space-y-4">
                                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest italic">3. Pilih Jenis Model</label>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        {['Manusia', 'Manekin', 'Tanpa Model', 'Kustom'].map(m => (
                                                            <button key={m} onClick={() => setModelType(m)} className={`py-4 rounded-2xl border text-[10px] font-black transition-all ${modelType === m ? "bg-indigo-600 text-white border-indigo-600 shadow-lg shadow-indigo-100" : "bg-slate-50 text-slate-400 border-slate-100 hover:bg-slate-100"}`}>{m}</button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            <div className="space-y-4">
                                                <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest italic flex items-center gap-1"><Icon name="Type" size={12}/> Instruksi Tambahan</label>
                                                <textarea className="w-full bg-slate-50 p-5 rounded-[2rem] border border-slate-200 text-xs lg:text-sm outline-none focus:ring-2 focus:ring-indigo-100 min-h-[100px] shadow-inner custom-scroll" placeholder="Tulis catatan sutradara Bapak di sini..." value={extraInstructions} onChange={(e) => setExtraInstructions(e.target.value)} />
                                                <label className="flex items-center gap-3 bg-indigo-50/50 p-5 rounded-[2rem] border border-indigo-100 border-dashed cursor-pointer hover:bg-indigo-50 transition-colors">
                                                    <input type="checkbox" checked={includeDoodles} onChange={(e) => setIncludeDoodles(e.target.checked)} className="w-5 h-5 accent-indigo-600" />
                                                    <span className="text-[10px] font-black text-indigo-700 uppercase italic tracking-widest">Gunakan Doodle Pintar</span>
                                                </label>
                                            </div>

                                            <div className="space-y-4">
                                                <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest italic font-bold">Pilih Rasio Video</label>
                                                <div className="grid grid-cols-3 gap-2">
                                                    {['1:1', '3:4', '4:3', '9:16', '16:9'].map((r) => (
                                                        <button key={r} onClick={() => setRatio(r)} className={`py-4 rounded-xl border text-[11px] font-black transition-all ${ratio === r ? "bg-slate-900 text-white border-slate-900 shadow-xl" : "bg-slate-50 text-slate-400 border-slate-100 hover:bg-slate-200"}`}>{r}</button>
                                                    ))}
                                                </div>
                                            </div>

                                            <button onClick={() => generateAI(activeTab)} disabled={isProcessing || productImages.length === 0} className="w-full bg-indigo-600 text-white font-black py-7 rounded-[2.5rem] shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-4 group disabled:opacity-50">
                                                {isProcessing ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="Sparkles" className="group-hover:rotate-12 transition-transform" />}
                                                <span className="text-sm uppercase tracking-[0.2em] font-black">{isProcessing ? 'Memproses JSON...' : 'Mulai Magic AI'}</span>
                                            </button>
                                            
                                            {isProcessing && <p className="text-center text-[10px] text-indigo-600 font-bold animate-pulse uppercase tracking-widest leading-none">{processStatus}</p>}
                                            {error && (
                                                <div className="p-5 bg-red-50 rounded-[2rem] border border-red-100 flex items-start gap-3 text-red-600 animate-in shadow-sm">
                                                    <Icon name="AlertCircle" size={18} className="mt-0.5 flex-shrink-0" />
                                                    <p className="text-[11px] font-bold leading-relaxed italic">{error}</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'result' && (
                                <div className="space-y-12 animate-in duration-700 pb-32">
                                    <h3 className="font-black text-2xl lg:text-3xl text-slate-900 tracking-tighter uppercase flex items-center gap-3 underline decoration-indigo-200 decoration-8 underline-offset-4 px-2 leading-none italic">
                                        <Icon name="Image" className="text-indigo-600"/> Galeri Master Prompt 4K
                                    </h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-16">
                                        {generatedResults.map((result, idx) => (
                                            <div key={idx} className="bg-slate-50 rounded-[4rem] p-10 border border-slate-200 flex flex-col shadow-inner animate-in">
                                                <div className="aspect-square rounded-[3rem] overflow-hidden border-4 border-white shadow-2xl bg-white relative group">
                                                    <img src={result.url} alt="Result Draft" className="w-full h-full object-cover grayscale-[20%] brightness-110" />
                                                    <div className="absolute top-8 left-8 bg-indigo-600/90 backdrop-blur-md px-6 py-3 rounded-full text-[11px] font-black text-white uppercase shadow-xl italic border border-white/20">Master {idx + 1} • {ratio} SYNC</div>
                                                </div>
                                                <div className="mt-10 p-8 bg-white rounded-[2.5rem] border border-indigo-50 shadow-xl flex flex-col gap-5">
                                                    <div className="flex items-center justify-between">
                                                        <div className="flex items-center gap-3">
                                                            <div className="p-3 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-100"><Icon name="Code" size={18} className="text-white" /></div>
                                                            <div>
                                                                <span className="text-[12px] font-black text-slate-900 uppercase block leading-none font-bold">Video Motion JSON</span>
                                                                <span className="text-[9px] font-bold text-indigo-400 uppercase tracking-widest italic">Sync Metadata</span>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => copyToClipboard(result.jsonPrompt, idx)} className={`p-4 rounded-2xl transition-all flex items-center gap-2 font-bold text-[10px] uppercase shadow-sm ${copiedIndex === idx ? "bg-green-500 text-white shadow-green-100 shadow-xl" : "bg-slate-100 text-slate-500 hover:bg-indigo-600 hover:text-white"}`}>
                                                            {copiedIndex === idx ? <Icon name="Check" size={16} /> : <Icon name="Copy" size={16} />}
                                                            {copiedIndex === idx ? "Berhasil!" : "Salin JSON"}
                                                        </button>
                                                    </div>
                                                    <div className="bg-slate-900 p-8 rounded-[2rem] overflow-x-auto shadow-inner custom-scroll border border-white/5 font-mono text-[11px] text-indigo-300 whitespace-pre-wrap">{result.jsonPrompt}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-20 flex justify-center"><button onClick={() => setActiveTab('home')} className="px-20 py-8 bg-indigo-600 text-white rounded-[3rem] font-black text-sm uppercase tracking-[0.3em] shadow-2xl active:scale-95 transition-all flex items-center gap-3"><Icon name="Home" size={20} /> Kembali Dashboard Utama</button></div>
                                </div>
                            )}
                        </main>

                        {/* Mobile Bottom Navigation */}
                        <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex items-center justify-around py-5 px-6 z-50 shadow-[0_-15px_30px_rgba(0,0,0,0.08)]">
                            <NavBtnMobile active={activeTab === 'home'} icon="Home" label="Home" onClick={() => setActiveTab('home')} />
                            <NavBtnMobile active={activeTab === 'merger'} icon="Layers3" label="Merge" onClick={() => { setActiveTab('merger'); setGeneratedResults([]); }} />
                            <NavBtnMobile active={activeTab === 'motion'} icon="Film" label="Film" onClick={() => { setActiveTab('motion'); setGeneratedResults([]); }} />
                            <NavBtnMobile active={activeTab === 'model'} icon="PersonStanding" label="Model" onClick={() => { setActiveTab('model'); setGeneratedResults([]); }} />
                        </div>
                    </div>
                </div>
            );
        };

        const NavBtn = ({ active, icon, label, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-6 px-10 py-6 rounded-[2rem] font-black transition-all ${active ? "sidebar-active scale-[1.05]" : "text-slate-400 hover:text-slate-900"}`}>
                <Icon name={icon} size={22} className={active ? "text-indigo-600" : ""} /><span className="text-[13px] uppercase tracking-tighter">{label}</span>
            </button>
        );

        const NavBtnMobile = ({ active, icon, label, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center gap-1.5 transition-all ${active ? "text-indigo-600 scale-125" : "text-slate-300"}`}><Icon name={icon} size={24} /><span className="text-[10px] font-black uppercase tracking-tight">{label}</span></button>
        );

        const FeatureCard = ({ icon, title, desc, onClick }) => (
            <div onClick={onClick} className="bg-white p-10 lg:p-14 rounded-[4.5rem] border border-slate-100 hover:border-indigo-300 hover:shadow-[0_60px_100px_-20px_rgba(79,70,229,0.15)] transition-all cursor-pointer group relative overflow-hidden animate-in shadow-sm">
                <div className="w-20 h-20 bg-slate-50 rounded-[2.5rem] flex items-center justify-center mb-10 group-hover:bg-indigo-600 group-hover:text-white transition-all shadow-sm border border-slate-100"><Icon name={icon} size={36} /></div>
                <h3 className="font-black text-slate-900 text-3xl mb-5 tracking-tighter italic leading-none">{title}</h3>
                <p className="text-[14px] text-slate-400 leading-relaxed font-bold mb-10 italic opacity-80 group-hover:text-slate-600 transition-colors">{desc}</p>
                <div className="flex items-center text-indigo-600 text-[11px] font-black uppercase tracking-[0.3em] group-hover:gap-6 transition-all">Buka Modul Master <Icon name="ArrowRight" size={20} className="ml-2" /></div>
            </div>
        );

        const ImageUploader = ({ type, images, handleUpload, handleClear }) => (
            <div className="bg-slate-50 p-6 lg:p-10 rounded-[4rem] border border-slate-200 shadow-inner">
                <div className="flex justify-between items-center mb-6 font-black text-[9px] uppercase text-stone-400 tracking-widest italic">
                    <span>{type === 'product' ? '1. Unggah Foto Produk (Maks 5)' : '2. Unggah Background (Maks 2)'}</span>
                    {images.length > 0 && <button onClick={handleClear} className="text-red-500 hover:scale-110 transition-all"><Icon name="X" size={22}/></button>}
                </div>
                <label className="block w-full aspect-square md:aspect-video bg-white border-2 border-dashed border-slate-200 rounded-[2.5rem] overflow-hidden cursor-pointer hover:border-indigo-500 transition-all relative group shadow-sm">
                    {images.length > 0 ? (
                        <div className="flex gap-3 p-6 flex-wrap justify-center h-full items-center">
                            {images.map((img, idx) => (
                                <img key={idx} src={img} alt="Input" className="h-full max-h-40 object-contain rounded-2xl border border-slate-100 shadow-md animate-in" />
                            ))}
                        </div>
                    ) : (
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-300">
                            <div className="p-10 bg-slate-50 rounded-full mb-4 shadow-sm group-hover:bg-indigo-50 transition-colors"><Icon name="Upload" size={48} /></div>
                            <span className="font-bold text-[11px] uppercase tracking-[0.3em]">Ketuk Untuk Unggah</span>
                        </div>
                    )}
                    <input type="file" className="hidden" onChange={(e) => handleUpload(e, type)} accept="image/*" multiple />
                </label>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
